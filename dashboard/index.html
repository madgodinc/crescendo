<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Crescendo — an orchestra of AI agents</title>
<script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<style>
  :root {
    --bg:#0d1017; --panel:#151a24; --line:#242b3a; --ink:#e8edf7; --dim:#8b94a8;
    --maestro:#e8b85a; --conductor:#6aa8ff; --soloist:#5ad19a; --tuningfork:#d97bb0;
    --stagetech:#f0a868; --archivist:#a78bfa;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--ink);
         font:15px/1.55 -apple-system,"Segoe UI",system-ui,sans-serif; }
  header { padding:20px 28px; border-bottom:1px solid var(--line); }
  header h1 { margin:0; font-size:22px; letter-spacing:-.3px; }
  header h1 .accent { color:var(--maestro); }
  header .sub { color:var(--dim); font-size:13px; margin-top:4px; }
  header .brief { margin-top:8px; font-size:14px; color:var(--ink); }
  header .brief b { color:var(--maestro); }
  .wrap { display:grid; grid-template-columns:1fr 480px; height:calc(100vh - 92px); }
  #graph { width:100%; height:100%; }
  .side { border-left:1px solid var(--line); background:var(--panel);
          display:flex; flex-direction:column; overflow:hidden; }
  .side h2 { margin:0; padding:15px 20px 11px; font-size:12px; letter-spacing:.09em;
             text-transform:uppercase; color:var(--dim); border-bottom:1px solid var(--line); }
  .feed { overflow-y:auto; flex:1; padding:6px 0; }
  .ev { padding:12px 20px; border-bottom:1px solid var(--line); animation:in .3s ease; }
  @keyframes in { from{opacity:0;transform:translateY(8px)} to{opacity:1} }
  .ev .who { font-weight:650; font-size:13px; }
  .ev .kind { font-size:10px; color:var(--dim); text-transform:uppercase; letter-spacing:.06em;
              margin-left:8px; padding:1px 7px; border:1px solid var(--line); border-radius:5px; }
  .ev .ts { float:right; color:var(--dim); font-size:11px; font-variant-numeric:tabular-nums; }
  .ev .txt { margin-top:5px; color:#c7cee0; font-size:13.5px; white-space:pre-wrap; }
  .who.human{color:#fff} .who.conductor{color:var(--conductor)} .who.soloist{color:var(--soloist)}
  .who.tuningfork{color:var(--tuningfork)} .who.stagetech{color:var(--stagetech)}
  .who.archivist{color:var(--archivist)}
  .ev.skills, .ev.recall, .ev.learn { background:rgba(167,139,250,.08); border-left:3px solid var(--archivist); }
  .ev.skills .txt, .ev.recall .txt, .ev.learn .txt { color:var(--archivist); }
  .ev.rider { background:rgba(245,200,90,.08); border-left:3px solid var(--maestro); }
  .ev.rider .txt { color:#f0d089; }
  .ev.review .txt { color:#ffd27b; }
  .ev.deploy { background:rgba(90,209,154,.08); border-left:3px solid var(--soloist); }
  .ev.deploy a { color:var(--soloist); font-weight:650; }
  .bar { padding:12px 20px; border-top:1px solid var(--line); display:flex; gap:10px; align-items:center; }
  button { background:var(--maestro); color:#1a1205; border:0; border-radius:7px;
           padding:8px 16px; font-weight:650; cursor:pointer; font-size:14px; }
  button.ghost { background:transparent; color:var(--ink); border:1px solid var(--line); }
  .count { color:var(--dim); font-size:13px; margin-left:auto; }
  .pill { font-size:11px; font-weight:650; text-transform:uppercase; letter-spacing:.07em;
          padding:3px 10px; border-radius:20px; margin-left:12px; vertical-align:middle; }
  .pill.running { background:rgba(232,184,90,.18); color:var(--maestro); border:1px solid var(--maestro); }
  .pill.done    { background:rgba(90,209,154,.18); color:var(--soloist); border:1px solid var(--soloist); }
  .pill.failed  { background:rgba(217,123,176,.18); color:var(--tuningfork); border:1px solid var(--tuningfork); }
  .pill.idle, .pill.offline { background:transparent; color:var(--dim); border:1px solid var(--line); }
  .pill .phase { opacity:.75; font-weight:500; }
  .runs { margin-top:10px; display:flex; gap:7px; flex-wrap:wrap; }
  .runs .run { font-size:12px; padding:4px 10px; border:1px solid var(--line); border-radius:6px;
               cursor:pointer; color:var(--dim); max-width:280px; overflow:hidden;
               text-overflow:ellipsis; white-space:nowrap; }
  .runs .run:hover { border-color:var(--maestro); color:var(--ink); }
  .runs .run.sel { border-color:var(--maestro); color:var(--ink); background:rgba(232,184,90,.08); }
  .runs .run .dot { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:6px; }
  .dot.running{background:var(--maestro)} .dot.done{background:var(--soloist)} .dot.failed{background:var(--tuningfork)}
</style>
</head>
<body>
<header>
  <h1>Crescendo · <span class="accent">an orchestra of AI agents</span>
    <span class="pill" id="status"></span></h1>
  <div class="sub">Maestro conducts; the Archivist feeds skills from memory; every decision is attributable.</div>
  <div class="brief" id="brief"></div>
  <div class="runs" id="runs"></div>
</header>
<div class="wrap">
  <div id="graph"></div>
  <div class="side">
    <h2>Decision trail · attributed &amp; auditable</h2>
    <div class="feed" id="feed"></div>
    <div class="bar">
      <button id="play">▶ Replay run</button>
      <button class="ghost" id="step">Step</button>
      <span class="count" id="count"></span>
    </div>
  </div>
</div>
<script>
const COLOR = { maestro:'#e8b85a', conductor:'#6aa8ff', soloist:'#5ad19a',
                tuningfork:'#d97bb0', stagetech:'#f0a868', archivist:'#a78bfa', human:'#ffffff' };
const DEFAULT_AGENTS = [
  { id:'conductor', label:'Conductor', role:'plans & routes' },
  { id:'soloist', label:'Soloist', role:'writes code' },
  { id:'tuningfork', label:'Tuning Fork', role:'reviews' },
  { id:'stagetech', label:'Stage Tech', role:'deploys' },
  { id:'archivist', label:'Archivist', role:'memory & skills' },
];
const fmt = ts => ts ? ts.slice(11,19) : '';
const el = id => document.getElementById(id);

let cy, timeline = [], rendered = 0, curRunId = null;
let liveMode = false, livePoll = null, selectedRun = null;

function buildGraph(agents) {
  const nodes = [{ data:{ id:'maestro', label:'Maestro', role:'orchestrator' } }]
    .concat(agents.map(a => ({ data:{ id:a.id, label:a.label, role:a.role } })));
  const edges = agents.map(a => ({ data:{ id:'e_'+a.id, source:'maestro', target:a.id } }));
  cy = cytoscape({
    container: el('graph'),
    elements: [...nodes, ...edges],
    style: [
      { selector:'node', style:{
        'background-color': e => COLOR[e.id()] || '#5566aa',
        'label':'data(label)', 'color':'#e8edf7', 'font-size':14, 'font-weight':650,
        'text-valign':'bottom', 'text-margin-y':7, 'width':52, 'height':52,
        'border-width':2, 'border-color':'#0d1017' } },
      { selector:'node[id="maestro"]', style:{ 'width':80,'height':80,'font-size':17 } },
      { selector:'edge', style:{ 'width':2,'line-color':'#242b3a','target-arrow-color':'#242b3a',
        'target-arrow-shape':'triangle','curve-style':'bezier','opacity':.5 } },
      { selector:'.active', style:{ 'border-color':'#e8b85a','border-width':4,
        'shadow-blur':26,'shadow-color':'#e8b85a','shadow-opacity':.8 } },
      { selector:'.fired', style:{ 'line-color':'#e8b85a','target-arrow-color':'#e8b85a','opacity':1,'width':3 } },
      { selector:'.skillpath', style:{ 'line-color':'#a78bfa','target-arrow-color':'#a78bfa','opacity':1,'width':3 } },
    ],
    layout:{ name:'concentric', concentric:n => n.id()==='maestro'?2:1, levelWidth:()=>1, minNodeSpacing:95 },
    userZoomingEnabled:false, userPanningEnabled:false, boxSelectionEnabled:false,
  });
}

function renderCount() { el('count').textContent = `${rendered} / ${timeline.length} events`; }

function resetView() {
  el('feed').innerHTML = ''; rendered = 0;
  if (cy) cy.elements().removeClass('active fired skillpath');
  renderCount();
}

// Render timeline[rendered] and advance. Returns false when caught up.
function step() {
  if (rendered >= timeline.length) return false;
  const e = timeline[rendered++];
  cy.nodes().removeClass('active');
  cy.edges().removeClass('skillpath');
  const node = cy.getElementById(e.actor);
  if (node) node.addClass('active');
  if (e.kind === 'skills' && e.meta && e.meta.to) {
    const edge = cy.getElementById('e_' + e.meta.to);
    if (edge) edge.addClass('skillpath');
    cy.getElementById('archivist').addClass('active');
  } else if (e.kind === 'recall' || e.kind === 'learn') {
    const edge = cy.getElementById('e_soloist');
    if (edge) edge.addClass('skillpath');
    cy.getElementById('archivist').addClass('active');
  } else {
    const edge = cy.getElementById('e_' + e.actor);
    if (edge) edge.addClass('fired');
  }
  const div = document.createElement('div');
  div.className = 'ev ' + e.kind;
  let txt = (e.text || '').replace(/</g,'&lt;');
  txt = txt.replace(/(https:\/\/[a-z0-9.-]+\.pages\.dev)/i, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  div.innerHTML = `<span class="ts">${fmt(e.ts)}</span>` +
    `<span class="who ${e.actor}">${e.actor}</span><span class="kind">${e.kind}</span>` +
    `<div class="txt">${txt}</div>`;
  el('feed').prepend(div);
  renderCount();
  return true;
}

function setStatus(status, phase) {
  const p = el('status');
  p.className = 'pill ' + (status || 'idle');
  const ph = (phase && phase !== 'done') ? ` <span class="phase">· ${phase}</span>` : '';
  p.innerHTML = (status || 'idle') + ph;
}

// Load a document {brief, agents, timeline, status, phase, run_id} into the view.
function loadDoc(doc, opts={}) {
  const agents = doc.agents && doc.agents.length ? doc.agents : DEFAULT_AGENTS;
  if (!cy || curRunId !== doc.run_id) { if (cy) cy.destroy(); buildGraph(agents); }
  curRunId = doc.run_id || null;
  timeline = doc.timeline || [];
  el('brief').innerHTML = '<b>Brief:</b> ' + (doc.brief || '');
  setStatus(doc.status, doc.phase);
  if (!opts.keepFeed) resetView();
  // catch up to the full timeline (no animation on bulk load)
  while (step()) {}
}

// --- live polling ---------------------------------------------------------
async function pollLive() {
  let doc;
  try { doc = await fetch('/api/live').then(r => r.json()); }
  catch { setStatus('offline'); return; }
  if (!doc || doc.status === 'idle') {
    if (!timeline.length) el('feed').innerHTML =
      '<div class="ev"><div class="txt">No active run. Start one: <code>uv run python maestro.py "your brief"</code></div></div>';
    setStatus('idle');
    return;
  }
  if (selectedRun && selectedRun !== doc.run_id) return; // user is viewing a past run
  if (doc.run_id !== curRunId) { loadDoc(doc); return; }  // new run -> full reload
  // same run: append only the new tail, animating each new event in
  el('brief').innerHTML = '<b>Brief:</b> ' + (doc.brief || '');
  setStatus(doc.status, doc.phase);
  timeline = doc.timeline || timeline;
  while (rendered < timeline.length) step();
}

async function refreshRuns() {
  let data; try { data = await fetch('/api/runs').then(r => r.json()); } catch { return; }
  const recent = (data && data.recent) || [];
  const box = el('runs');
  box.innerHTML = '';
  recent.forEach(r => {
    const d = document.createElement('div');
    d.className = 'run' + ((selectedRun||data.current) === r.run_id ? ' sel' : '');
    d.title = r.brief || r.run_id;
    d.innerHTML = `<span class="dot ${r.status}"></span>` + (r.brief || r.run_id).slice(0,40);
    d.onclick = () => selectRun(r.run_id, r.run_id === data.current);
    box.appendChild(d);
  });
}

async function selectRun(runId, isCurrent) {
  selectedRun = isCurrent ? null : runId;   // null = follow the live/current run
  const url = isCurrent ? '/api/live' : '/api/run/' + runId;
  try { const doc = await fetch(url).then(r => r.json()); loadDoc(doc); } catch {}
  refreshRuns();
}

async function boot() {
  // Prefer the live API (served by serve.py); fall back to the static replay.json.
  let live = null;
  try { live = await fetch('/api/live').then(r => r.ok ? r.json() : null); } catch {}
  if (live) {
    liveMode = true;
    if (live.status && live.status !== 'idle') loadDoc(live);
    else { buildGraph(DEFAULT_AGENTS); setStatus('idle'); }
    await refreshRuns();
    livePoll = setInterval(pollLive, 1500);
    setInterval(refreshRuns, 10000);
  } else {
    // offline: static replay.json, with manual replay/step
    const data = await fetch('replay.json').then(r => r.json()).catch(() => null);
    if (!data) { el('feed').innerHTML =
      '<div class="ev"><div class="txt">No data — run serve.py (live) or maestro.py (replay.json).</div></div>'; return; }
    loadDoc({ ...data, status:'done', phase:'done' });
    setStatus('offline');
  }

  // Replay / Step always work on the in-memory timeline (great for finished runs).
  el('step').onclick = step;
  el('play').onclick = async () => {
    resetView();
    while (step()) await new Promise(r => setTimeout(r, 800));
  };
}
boot();
</script>
</body>
</html>
