# Build the brain from source instead of pulling the prebuilt image.
# Use when you don't want to trust the published image, or to build for an arch
# that isn't published:
#
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up --build
#
# First build is slow: it compiles the Rust binary and bakes ~550MB of models
# into the image. Subsequent runs are cached.

services:
  brain:
    image: crescendo-brain:local
    build:
      context: ./brain
      dockerfile: Dockerfile
