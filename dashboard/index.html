<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Crescendo · orchestra of AI agents</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root { --ui:'Space Grotesk',ui-sans-serif,system-ui,sans-serif; --mono:'JetBrains Mono',ui-monospace,monospace; }
  :root {
    --bg:#06080f; --bg2:#0a0e1a; --panel:rgba(16,22,38,.72); --line:rgba(120,140,200,.14);
    --ink:#eaf0ff; --dim:#7e8aa8;
    --maestro:#ffcf5a; --conductor:#5aa8ff; --soloist:#4fe0a8; --tuningfork:#ff7bc6;
    --stagetech:#ff9a5a; --archivist:#b89bff; --human:#dfe6ff;
    --glow:0 0 40px;
  }
  * { box-sizing:border-box; }
  html,body { height:100%; margin:0; }
  body {
    background:
      radial-gradient(1200px 700px at 22% -10%, rgba(90,168,255,.10), transparent 60%),
      radial-gradient(1000px 600px at 100% 110%, rgba(184,155,255,.10), transparent 60%),
      var(--bg);
    color:var(--ink); overflow:hidden;
    font:14px/1.5 var(--ui);
    -webkit-font-smoothing:antialiased;
  }
  code, .mono, .ev .ts, .count, .run .rid { font-family:var(--mono); }
  /* scanlines + vignette — sci-fi atmosphere, near-free */
  body::after {
    content:""; position:fixed; inset:0; z-index:50; pointer-events:none;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,.16) 0, rgba(0,0,0,.16) 1px, transparent 2px, transparent 3px),
      radial-gradient(130% 110% at 50% 45%, transparent 55%, rgba(0,0,0,.45) 100%);
    mix-blend-mode:multiply; opacity:.5;
  }
  /* faint moving grid backdrop */
  body::before {
    content:""; position:fixed; inset:0; z-index:0; pointer-events:none; opacity:.5;
    background-image:
      linear-gradient(rgba(120,140,200,.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(120,140,200,.05) 1px, transparent 1px);
    background-size:46px 46px;
    mask-image:radial-gradient(120% 100% at 50% 30%, #000 30%, transparent 80%);
    animation:drift 26s linear infinite;
  }
  @keyframes drift { to { background-position:46px 46px, 46px 46px; } }

  .app { position:relative; z-index:1; display:grid; grid-template-columns:1fr 430px;
         grid-template-rows:auto 1fr; height:100vh; }

  header { grid-column:1 / 3; display:flex; align-items:center; gap:18px;
           padding:16px 26px; border-bottom:1px solid var(--line);
           background:linear-gradient(180deg, rgba(10,14,26,.6), transparent); }
  .logo { font-size:20px; font-weight:800; letter-spacing:.2px; white-space:nowrap; }
  .logo .c { background:linear-gradient(90deg,#ffcf5a,#ff9a5a,#ffcf5a); background-size:200% auto;
             -webkit-background-clip:text; background-clip:text; color:transparent;
             animation:shimmer 6s linear infinite; }
  @keyframes shimmer { to { background-position:200% center; } }
  .logo .sub { font-weight:500; color:var(--dim); font-size:12px; margin-left:8px; }
  .brief { color:var(--ink); font-size:13.5px; opacity:.9; overflow:hidden;
           text-overflow:ellipsis; white-space:nowrap; flex:1; min-width:0; }
  .brief b { color:var(--maestro); font-weight:700; }
  .pill { font-size:11px; font-weight:800; text-transform:uppercase; letter-spacing:.1em;
          padding:5px 13px; border-radius:30px; display:flex; align-items:center; gap:7px;
          white-space:nowrap; border:1px solid transparent; }
  .pill .led { width:8px; height:8px; border-radius:50%; }
  .pill.running { color:var(--maestro); border-color:rgba(255,207,90,.5); background:rgba(255,207,90,.08); }
  .pill.running .led { background:var(--maestro); box-shadow:0 0 10px var(--maestro); animation:blink 1.1s ease-in-out infinite; }
  .pill.done { color:var(--soloist); border-color:rgba(79,224,168,.5); background:rgba(79,224,168,.08); }
  .pill.done .led { background:var(--soloist); box-shadow:0 0 10px var(--soloist); }
  .pill.failed { color:var(--tuningfork); border-color:rgba(255,123,198,.5); background:rgba(255,123,198,.08); }
  .pill.failed .led { background:var(--tuningfork); }
  .pill.idle, .pill.offline { color:var(--dim); border-color:var(--line); }
  .pill.idle .led, .pill.offline .led { background:var(--dim); }
  .pill .phase { opacity:.7; font-weight:600; letter-spacing:.04em; }
  @keyframes blink { 50% { opacity:.35; } }

  /* stage = canvas graph */
  .stage { position:relative; overflow:hidden; }
  #graph { position:absolute; inset:0; width:100%; height:100%; display:block; }

  /* "NOW" hero — what the orchestra is doing this instant */
  .now { position:absolute; top:20px; left:50%; transform:translateX(-50%);
         display:flex; align-items:center; gap:11px; padding:9px 18px; border-radius:30px;
         background:rgba(16,22,38,.7); border:1px solid var(--line); backdrop-filter:blur(10px);
         font-size:13.5px; white-space:nowrap; max-width:80%; transition:.3s; opacity:0; }
  .now.show { opacity:1; }
  .now .glyph { font-size:16px; }
  .now .who { font-weight:700; color:var(--now,#fff); }
  .now .verb { color:var(--dim); }
  .now .wave { display:flex; gap:3px; align-items:flex-end; height:14px; margin-left:2px; }
  .now .wave i { width:3px; background:var(--now,#fff); border-radius:2px; animation:eq 1s ease-in-out infinite; }
  .now .wave i:nth-child(2){ animation-delay:.15s } .now .wave i:nth-child(3){ animation-delay:.3s }
  .now .wave i:nth-child(4){ animation-delay:.45s }
  @keyframes eq { 0%,100%{ height:4px } 50%{ height:14px } }

  /* idle hero — inviting first impression over the breathing orbs */
  .idle { position:absolute; top:50%; left:50%; transform:translate(-50%,calc(-50% - 4px));
          text-align:center; pointer-events:none; opacity:0; transition:opacity .4s; z-index:3; }
  .idle.show { opacity:1; }
  .idle-title { font-size:15px; font-weight:600; letter-spacing:.18em; text-transform:uppercase;
                color:var(--dim); margin-bottom:14px; }
  .idle-cmd { font-family:var(--mono); font-size:13px; color:var(--ink); padding:11px 18px;
              border:1px solid var(--line); border-radius:10px; background:rgba(16,22,38,.72);
              backdrop-filter:blur(8px); }
  .idle-cmd .prompt { color:var(--maestro); margin-right:8px; }
  .idle-cmd .arg { color:var(--soloist); }

  /* deploy payoff banner over the stage */
  .shipped { position:absolute; top:38%; left:50%; transform:translate(-50%,-50%);
             text-align:center; pointer-events:none; opacity:0; z-index:4; }
  .shipped .badge { font-size:22px; font-weight:700; letter-spacing:.12em; color:var(--soloist);
                    text-shadow:0 0 24px rgba(79,224,168,.7); }
  .shipped .url { display:block; margin-top:8px; font-family:var(--mono); font-size:13px;
                  color:var(--ink); pointer-events:auto; }
  .shipped .url a { color:var(--soloist); text-decoration:none; }

  /* phase rail bottom-left over the canvas */
  .rail { position:absolute; left:24px; bottom:22px; display:flex; gap:10px;
          padding:10px 14px; border-radius:14px; background:var(--panel);
          border:1px solid var(--line); backdrop-filter:blur(10px); }
  .rail .ph { display:flex; align-items:center; gap:8px; font-size:11.5px; color:var(--dim);
              font-weight:600; }
  .rail .ph .ring { width:13px; height:13px; border-radius:50%; border:2px solid var(--dim);
                    position:relative; transition:.3s; }
  .rail .ph.active { color:var(--ink); }
  .rail .ph.active .ring { border-color:var(--maestro); box-shadow:0 0 12px var(--maestro);
                           animation:pulse 1.2s ease-in-out infinite; }
  .rail .ph.done { color:var(--soloist); }
  .rail .ph.done .ring { border-color:var(--soloist); background:var(--soloist); box-shadow:0 0 10px rgba(79,224,168,.6); }
  .rail .sep { width:16px; height:2px; align-self:center; background:var(--line); border-radius:2px; }
  @keyframes pulse { 50% { transform:scale(1.25); } }

  /* right column: decision trail + runs */
  .side { border-left:1px solid var(--line); background:linear-gradient(180deg, rgba(10,14,26,.5), rgba(6,8,15,.5));
          display:flex; flex-direction:column; min-height:0; }
  .side h2 { margin:0; padding:16px 22px 12px; font-size:11px; letter-spacing:.14em;
             text-transform:uppercase; color:var(--dim); display:flex; align-items:center; gap:9px; }
  .side h2::before { content:""; width:6px; height:6px; border-radius:50%; background:var(--maestro);
                     box-shadow:0 0 10px var(--maestro); }
  .feed { overflow-y:auto; flex:1; padding:4px 14px 14px; }
  .feed::-webkit-scrollbar { width:8px; } .feed::-webkit-scrollbar-thumb { background:var(--line); border-radius:8px; }
  .ev { position:relative; margin:8px 0; padding:11px 14px 12px 16px; border-radius:13px;
        background:rgba(20,27,46,.5); border:1px solid var(--line); }
  .ev::before { content:""; position:absolute; left:0; top:10px; bottom:10px; width:3px;
                border-radius:3px; background:var(--actor,#788); }
  .ev .top { display:flex; align-items:center; gap:8px; }
  .ev .who { font-weight:750; font-size:12.5px; color:var(--actor,#cbd); }
  .ev .kind { font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--dim);
              padding:2px 8px; border:1px solid var(--line); border-radius:20px; }
  .ev .ts { margin-left:auto; color:var(--dim); font-size:10.5px; font-variant-numeric:tabular-nums; }
  .ev .txt { margin-top:6px; color:#cdd6ee; font-size:12.5px; white-space:pre-wrap; word-break:break-word; }
  .ev .txt a { color:var(--soloist); font-weight:700; text-decoration:none; border-bottom:1px solid rgba(79,224,168,.4); }
  .ev .glyph { font-size:13px; }
  .ev.skills, .ev.recall, .ev.learn { background:rgba(184,155,255,.07); }
  .ev.rider { background:rgba(255,207,90,.06); }
  .ev.deploy { background:rgba(79,224,168,.10); border-color:rgba(79,224,168,.4);
               box-shadow:0 0 24px rgba(79,224,168,.12) inset; }
  .ev.deploy .kind { color:var(--soloist); border-color:rgba(79,224,168,.5); }

  .runs { border-top:1px solid var(--line); padding:12px 14px; display:flex; flex-direction:column; gap:7px;
          max-height:34vh; overflow-y:auto; }
  .runs .title { font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); margin:2px 6px 4px; }
  .run { display:flex; align-items:center; gap:9px; font-size:12px; color:var(--dim); cursor:pointer;
         padding:8px 11px; border:1px solid var(--line); border-radius:10px; transition:.18s;
         overflow:hidden; white-space:nowrap; }
  .run:hover { color:var(--ink); border-color:rgba(120,140,200,.35); transform:translateX(2px); }
  .run.sel { color:var(--ink); border-color:rgba(255,207,90,.5); background:rgba(255,207,90,.06); }
  .run .dot { width:8px; height:8px; border-radius:50%; flex:none; }
  .run .lbl { overflow:hidden; text-overflow:ellipsis; }
  .dot.running { background:var(--maestro); box-shadow:0 0 8px var(--maestro); animation:blink 1.1s infinite; }
  .dot.done { background:var(--soloist); } .dot.failed { background:var(--tuningfork); } .dot.idle { background:var(--dim); }

  .bar { display:flex; gap:9px; align-items:center; padding:11px 16px; border-top:1px solid var(--line); }
  button { background:linear-gradient(180deg, rgba(255,207,90,.95), rgba(255,154,90,.9)); color:#1a1205;
           border:0; border-radius:9px; padding:8px 15px; font-weight:750; font-size:12.5px; cursor:pointer;
           transition:.15s; }
  button:hover { filter:brightness(1.08); box-shadow:0 0 18px rgba(255,180,90,.35); }
  button.ghost { background:transparent; color:var(--ink); border:1px solid var(--line); }
  button.ghost:hover { border-color:rgba(120,140,200,.4); box-shadow:none; }
  .count { color:var(--dim); font-size:11.5px; margin-left:auto; font-variant-numeric:tabular-nums; }

  @media (max-width:1040px) {
    .app { grid-template-columns:1fr; grid-template-rows:auto 56vh 1fr; }
    .side { border-left:0; border-top:1px solid var(--line); }
    .now { max-width:92%; }
  }
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">Cre<span class="c">scendo</span><span class="sub">orchestra of AI agents</span></div>
    <div class="brief" id="brief"></div>
    <div class="pill idle" id="status"><span class="led"></span><span id="statusText">idle</span></div>
  </header>

  <div class="stage">
    <canvas id="graph"></canvas>
    <div class="now" id="now"></div>
    <div class="shipped" id="shipped"></div>
    <div class="idle" id="idle">
      <div class="idle-title">Awaiting a brief</div>
      <div class="idle-cmd"><span class="prompt">$</span> uv run python maestro.py <span class="arg">"build a dark-themed timer page"</span></div>
    </div>
    <div class="rail" id="rail"></div>
  </div>

  <div class="side">
    <h2>Decision trail · attributed &amp; auditable</h2>
    <div class="feed" id="feed"></div>
    <div class="bar">
      <button id="play">▶ Replay</button>
      <button class="ghost" id="step">Step</button>
      <span class="count" id="count"></span>
    </div>
    <div class="runs" id="runs"></div>
  </div>
</div>

<script>
// ── config ────────────────────────────────────────────────────────────────
const COLOR = { maestro:'#ffcf5a', conductor:'#5aa8ff', soloist:'#4fe0a8',
                tuningfork:'#ff7bc6', stagetech:'#ff9a5a', archivist:'#b89bff', human:'#dfe6ff' };
const DEFAULT_AGENTS = [
  { id:'conductor', label:'Conductor', role:'plans & routes' },
  { id:'soloist', label:'Soloist', role:'writes code' },
  { id:'tuningfork', label:'Tuning Fork', role:'reviews' },
  { id:'stagetech', label:'Stage Tech', role:'deploys' },
  { id:'archivist', label:'Archivist', role:'memory & skills' },
];
const PHASES = ['rider','plan','code-review','deploy','archive'];
const PHASE_LABEL = { rider:'Rider', plan:'Plan', 'code-review':'Code ↔ Review', deploy:'Deploy', archive:'Archive' };
const fmt = ts => ts ? ts.slice(11,19) : '';
const el = id => document.getElementById(id);

let timeline = [], rendered = 0, curRunId = null, selectedRun = null, curPhase = 'rider';

// glyph per agent — a coherent MONOCHROME set (no emoji-presentation chars like
// ⚖/⚙ that render color on mac, no obscure ⤳ that tofus on Windows).
const GLYPH = { maestro:'◆', conductor:'▲', soloist:'♪', tuningfork:'◈',
                stagetech:'▣', archivist:'✦', human:'●' };
// canvas ctx.font cannot resolve CSS var(); use the literal family names.
const FONT_UI = "'Space Grotesk',system-ui,sans-serif";

// ── canvas graph engine ─────────────────────────────────────────────────────
const TAU = Math.PI*2;
const Graph = (() => {
  const cvs = el('graph'), ctx = cvs.getContext('2d');
  let W=0, H=0, DPR=1, nodes=[], edges={}, particles=[], motes=[], shock=[], last=0, intro=0;

  function seedMotes() {
    motes = [];
    const n = Math.round((W*H)/26000);   // density scales with area
    for (let i=0;i<n;i++) motes.push({
      x:Math.random()*W, y:Math.random()*H,
      vx:(Math.random()-.5)*6, vy:(Math.random()-.5)*6,
      r:Math.random()*1.2+0.7, a:Math.random()*0.3+0.18, ph:Math.random()*6.28 });
  }
  function resize() {
    DPR = Math.min(window.devicePixelRatio||1, 2);
    const r = cvs.getBoundingClientRect();
    W = r.width; H = r.height;
    cvs.width = W*DPR; cvs.height = H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
    seedMotes();
    layout();
  }
  function layout() {
    // nudge the hub slightly up-left of centre so the composition isn't a dead-
    // symmetric bullseye — gives it a focal point and breathing negative space.
    const cx=W*0.48, cy=H*0.46, R=Math.min(W, H-70)*0.35;
    const spokes = nodes.filter(m=>m.id!=='maestro');
    nodes.forEach(n => {
      if (n.id==='maestro') { n.x=cx; n.y=cy; n.r=Math.max(46, R*0.34); }   // clearly the hero
      else {
        const k = spokes.indexOf(n), cnt = spokes.length || 1;
        const a = -Math.PI/2 + k*(2*Math.PI/cnt);
        // slight per-node radius + distance jitter (golden-ratio phased) to break symmetry
        const jit = 0.88 + 0.24*((k*0.618) % 1);
        n.ang = a; n.x = cx + Math.cos(a)*R*jit; n.y = cy + Math.sin(a)*R*jit;
        n.r = Math.max(24, R*0.185*jit);
      }
    });
  }
  function setAgents(agents) {
    nodes = [{ id:'maestro', label:'Maestro', role:'orchestrator', glow:0, pulse:0, ph:0 }]
      .concat(agents.map((a,i) => ({ id:a.id, label:a.label, role:a.role, glow:0, pulse:0, ph:i })));
    edges = {};
    nodes.filter(n=>n.id!=='maestro').forEach(n => edges[n.id] = { flow:0 });
    particles = []; intro = 0;
    layout();
  }
  const node = id => nodes.find(n=>n.id===id);

  function fire(actor, kind, meta) {
    const n = node(actor); if (n) { n.glow = 1; n.pulse = 1; }
    const m = node('maestro'); if (m) m.glow = Math.max(m.glow, .8);
    let id = actor, col = COLOR[actor] || '#88a';
    if ((kind==='skills') && meta && meta.to) { id = meta.to; col = COLOR.archivist;
      const a=node('archivist'); if(a){a.glow=1;a.pulse=1;} }
    else if (kind==='recall' || kind==='learn') { id = 'soloist'; col = COLOR.archivist;
      const a=node('archivist'); if(a){a.glow=1;a.pulse=1;} }
    if (edges[id]) edges[id].flow = 1;
    const dir = (kind==='code'||kind==='review'||kind==='skills'||kind==='recall'||kind==='learn') ? 'both'
              : (actor==='human'||actor==='conductor') ? 'out' : 'in';
    spawn(id, col, dir);
    if (kind==='deploy') celebrate();
  }
  function celebrate() {  // deploy = the climax — make it spectacular
    const m = node('maestro'), s = node('stagetech');
    if (!m) return;
    const col = COLOR.stagetech;
    if (s) shock.push({ x:s.x, y:s.y, t:0, dur:1.1, speed:260, col });
    shock.push({ x:m.x, y:m.y, t:0, dur:1.4, speed:340, col:COLOR.maestro });
    m.glow = 1.6; m.pulse = 1.6;
    // radial particle burst from the hub
    for (let i=0;i<40;i++){
      const a = (i/40)*6.283, sp = 80+Math.random()*120;
      particles.push({ free:true, col:i%2?COLOR.maestro:COLOR.soloist,
        x:m.x, y:m.y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp, life:1 });
    }
  }
  function spawn(id, col, dir) {
    const n = node(id); if(!n) return;
    const burst = 12;
    for (let i=0;i<burst;i++) {
      const d = dir==='both' ? (i%2?1:-1) : (dir==='out'?1:-1);
      particles.push({ id, col, p: d>0?0:1, dir:d, speed:.45+Math.random()*.35,
                       lane:(Math.random()-.5), delay:i*0.04, trail:[] });
    }
  }
  const easeInOut = t => t<.5 ? 2*t*t : 1-Math.pow(-2*t+2,2)/2;
  const easeOutCubic = t => 1-Math.pow(1-t,3);
  // fractional Brownian motion — layered sines for organic, non-mechanical drift
  const fbm = (x, t) => Math.sin(x+t)*0.5 + Math.sin(x*2.1+t*1.7)*0.25 + Math.sin(x*4.3+t*0.6)*0.125;
  // a curved channel from hub m to node n: control point offset perpendicular so
  // edges arc instead of being straight 8-bit lines (Gephi-style bezier).
  function ctrl(m, n, bend) {
    const mx=(m.x+n.x)/2, my=(m.y+n.y)/2, dx=n.x-m.x, dy=n.y-m.y, len=Math.hypot(dx,dy)||1;
    return [mx + (-dy/len)*bend, my + (dx/len)*bend];
  }
  // point + tangent along the quadratic bezier at parameter t
  function bez(m, cx, cy, n, t) {
    const u=1-t;
    const x = u*u*m.x + 2*u*t*cx + t*t*n.x;
    const y = u*u*m.y + 2*u*t*cy + t*t*n.y;
    return [x, y];
  }

  function draw(now) {
    const dt = Math.min((now - last)/1000 || 0, 0.05); last = now;  // frame-rate independent
    intro = Math.min(1, intro + dt*0.9);
    ctx.clearRect(0,0,W,H);
    const m = node('maestro'); if(!m) { requestAnimationFrame(draw); return; }
    const T = now/1000;
    const ease = easeInOut(intro);

    // ── ambient nebula motes: fBM drift, additive so overlaps brighten ──
    ctx.globalCompositeOperation = 'lighter';
    for (const p of motes) {
      p.x += (p.vx + fbm(p.ph, T*0.3)*8)*dt;
      p.y += (p.vy + fbm(p.ph+9, T*0.3)*8)*dt;
      if (p.x<-20)p.x=W+20; if(p.x>W+20)p.x=-20; if(p.y<-20)p.y=H+20; if(p.y>H+20)p.y=-20;
      const tw = p.a*(0.5+0.5*Math.sin(T*1.3+p.ph));
      const g = ctx.createRadialGradient(p.x,p.y,0, p.x,p.y, p.r*4);
      g.addColorStop(0, `rgba(150,180,255,${tw})`); g.addColorStop(1,'rgba(150,180,255,0)');
      ctx.fillStyle=g; ctx.beginPath(); ctx.arc(p.x,p.y,p.r*4,0,7); ctx.fill();
    }
    ctx.globalCompositeOperation = 'source-over';

    // store each node's curved-channel control point for this frame (particles reuse it)
    nodes.forEach(n => { if(n.id!=='maestro'){
      // constant baseline bend (alternating handedness) so channels ALWAYS curve
      // like an orchestral fan — never flatten back to a straight 8-bit line
      const side = (n.ph % 2) ? 1 : -1;
      const bend = side * (26 + Math.sin(T*0.4 + n.ph)*8);
      [n._cx, n._cy] = ctrl(m, n, bend);
    }});

    // ── deploy shockwaves (additive) ──
    ctx.globalCompositeOperation = 'lighter';
    for (let i=shock.length-1;i>=0;i--){
      const s=shock[i]; s.t+=dt; const k=s.t/s.dur;
      if (k>=1){ shock.splice(i,1); continue; }
      // ease-out: expand fast, then settle (a real shockwave) — radius = ease(k)*max
      ctx.beginPath(); ctx.arc(s.x,s.y, easeOutCubic(k)*s.speed*s.dur, 0, TAU);
      ctx.strokeStyle = hex(s.col, (1-k)*0.55); ctx.lineWidth = 4*(1-k); ctx.stroke();
    }
    ctx.globalCompositeOperation = 'source-over';

    // ── channels: curved bezier tubes with additive bloom + travelling shimmer ──
    ctx.globalCompositeOperation = 'lighter';
    nodes.filter(n=>n.id!=='maestro').forEach(n => {
      const e = edges[n.id] || {flow:0};
      const base = COLOR[n.id] || '#5566aa';
      const cx = m.x + (n._cx-m.x)*ease, cy = m.y + (n._cy-m.y)*ease;
      const ex = m.x + (n.x-m.x)*ease, ey = m.y + (n.y-m.y)*ease;
      const path = () => { ctx.beginPath(); ctx.moveTo(m.x,m.y); ctx.quadraticCurveTo(cx,cy,ex,ey); ctx.stroke(); };
      ctx.lineCap='round';
      // wide soft glow tube
      ctx.strokeStyle = hex(base, .05 + e.flow*.10); ctx.lineWidth = 7 + e.flow*8; path();
      // mid
      ctx.strokeStyle = hex(base, .10 + e.flow*.20); ctx.lineWidth = 2.5 + e.flow*3; path();
      // bright travelling shimmer core (a moving highlight along the channel)
      const sh = (Math.sin(T*1.2 + n.ph)*0.5+0.5);
      const [sx, sy] = bez(m, cx, cy, n, sh);
      const gg = ctx.createRadialGradient(sx,sy,0, sx,sy, 26);
      gg.addColorStop(0, hex(base, .5+e.flow*.4)); gg.addColorStop(1, hex(base,0));
      ctx.save(); ctx.beginPath(); ctx.moveTo(m.x,m.y); ctx.quadraticCurveTo(cx,cy,ex,ey);
      ctx.lineWidth = 2.5; ctx.strokeStyle = gg; ctx.stroke(); ctx.restore();
      e.flow = Math.max(0, e.flow - dt*0.85);
    });
    ctx.globalCompositeOperation = 'source-over';

    // ── particles flowing ALONG the curve (additive glow) ──
    ctx.globalCompositeOperation = 'lighter';
    for (let i=particles.length-1;i>=0;i--) {
      const pr = particles[i];
      if (pr.delay>0) { pr.delay-=dt; continue; }
      if (pr.free) {  // celebration burst: free-flying, fades out
        pr.x+=pr.vx*dt; pr.y+=pr.vy*dt; pr.vx*=0.95; pr.vy*=0.95; pr.life-=dt*0.85;
        if (pr.life<=0){ particles.splice(i,1); continue; }
        bloomDot(pr.x,pr.y, 3*pr.life+0.6, pr.col, pr.life);
        continue;
      }
      const n = node(pr.id); if(!n){ particles.splice(i,1); continue; }
      pr.p += pr.speed*pr.dir*dt;
      if (pr.p<=0 || pr.p>=1) { particles.splice(i,1); continue; }
      const e2 = easeInOut(pr.p);
      const [x,y] = bez(m, n._cx, n._cy, n, e2);
      const fade = Math.sin(pr.p*Math.PI);
      pr.trail.push([x,y]); if (pr.trail.length>7) pr.trail.shift();
      for (let k=0;k<pr.trail.length;k++){
        const a=(k/pr.trail.length)*0.45*fade;
        bloomDot(pr.trail[k][0],pr.trail[k][1], 1.6*fade+0.3, pr.col, a*2);
      }
      bloomDot(x,y, 2.6*fade+0.7, pr.col, fade);
    }
    ctx.globalCompositeOperation = 'source-over';

    // ── nodes: multi-layer additive bloom orb (soft halo + core) + Fresnel rim ──
    nodes.forEach(n => {
      const col = COLOR[n.id] || '#7788cc';
      const isHub = n.id==='maestro';
      const breathe = 1 + fbm(n.ph, T*0.8)*0.05;
      const r = n.r*breathe*(0.55+0.45*ease);
      const lum = 0.5 + n.glow*0.5;

      // additive bloom: wide soft halo (kept low so 5 hub channels don't blow out)
      ctx.globalCompositeOperation = 'lighter';
      bloomDisc(n.x,n.y, r*(2.4+n.pulse*1.1), col, (0.04+n.glow*0.09));
      ctx.globalCompositeOperation = 'source-over';

      // dark base disc — gives the orb a solid body and punches a void under the
      // additive glow so the rim reads as a lit shell, not a fuzzy gumdrop.
      ctx.beginPath(); ctx.arc(n.x,n.y, r, 0, TAU);
      ctx.fillStyle = 'rgba(8,11,20,0.82)'; ctx.fill();

      // Fresnel shell: near-empty interior, a tight bright rim at the edge
      const g = ctx.createRadialGradient(n.x,n.y, r*0.2, n.x,n.y, r);
      g.addColorStop(0, hex(col, 0.04 + n.glow*0.10));
      g.addColorStop(0.6, hex(col, 0.06 + n.glow*0.12));
      g.addColorStop(0.9, hex(col, 0.35*lum));
      g.addColorStop(0.97, hex(col, 0.9*lum));
      g.addColorStop(1, hex(col, 0.0));
      ctx.globalCompositeOperation = 'lighter';
      ctx.beginPath(); ctx.arc(n.x,n.y, r, 0, TAU); ctx.fillStyle = g; ctx.fill();
      // off-center specular highlight — the glassy hot-spot that makes it a sphere
      const hl = ctx.createRadialGradient(n.x-r*0.32, n.y-r*0.34, 0, n.x-r*0.32, n.y-r*0.34, r*0.6);
      hl.addColorStop(0, `rgba(255,255,255,${0.22+n.glow*0.2})`); hl.addColorStop(1,'rgba(255,255,255,0)');
      ctx.fillStyle = hl; ctx.beginPath(); ctx.arc(n.x,n.y, r, 0, TAU); ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
      // crisp rim
      ctx.beginPath(); ctx.arc(n.x,n.y, r, 0, TAU);
      ctx.lineWidth = (isHub?2:1.5) + n.glow*2; ctx.strokeStyle = hex(col, 0.75*lum); ctx.stroke();

      if (isHub) { // hub: twin counter-rotating dashed rings — a conductor's halo
        for (const [rad,dir,dash,al] of [[1.22,1,[2,12],0.28],[1.42,-1,[2,20],0.18]]) {
          ctx.save(); ctx.translate(n.x,n.y); ctx.rotate(T*0.3*dir);
          ctx.beginPath(); ctx.arc(0,0, r*rad, 0, 7);
          ctx.setLineDash(dash); ctx.strokeStyle = hex(col, al+n.glow*0.3);
          ctx.lineWidth=1.4; ctx.stroke(); ctx.setLineDash([]); ctx.restore();
        }
      }
      // glyph
      ctx.fillStyle = hex('#ffffff', 0.95);
      ctx.font = `${Math.round(r*0.6)}px ${FONT_UI}`;
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(GLYPH[n.id]||'●', n.x, n.y+1);
      // label radially outward, dark halo
      const lx = isHub ? n.x : n.x + Math.cos(n.ang)*(r+16);
      const ly = isHub ? n.y + r + 18 : n.y + Math.sin(n.ang)*(r+16);
      ctx.font = (isHub?`600 15px ${FONT_UI}`:`500 12.5px ${FONT_UI}`);
      ctx.textBaseline = isHub ? 'top' : 'middle';
      ctx.textAlign = isHub ? 'center' : (Math.cos(n.ang)<-0.3?'right':(Math.cos(n.ang)>0.3?'left':'center'));
      ctx.lineWidth=3.5; ctx.strokeStyle='rgba(6,8,15,.92)'; ctx.strokeText(n.label, lx, ly);
      ctx.fillStyle = hex('#eaf0ff', .95); ctx.fillText(n.label, lx, ly);
      n.glow = Math.max(0, n.glow - dt*1.0); n.pulse = Math.max(0, n.pulse - dt*1.6);
    });

    requestAnimationFrame(draw);
  }
  function hex(c,a){ const n=parseInt(c.slice(1),16); return `rgba(${n>>16&255},${n>>8&255},${n&255},${a})`; }
  // a soft radial "bloom" disc (assumes caller set globalCompositeOperation)
  function bloomDisc(x,y,r,col,a){
    const g=ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,hex(col,a)); g.addColorStop(1,hex(col,0));
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill();
  }
  function bloomDot(x,y,r,col,a){
    bloomDisc(x,y,r*3,col,a*0.5);   // soft halo
    ctx.fillStyle=hex(col,Math.min(1,a)); ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill();  // core
  }

  let rt; window.addEventListener('resize', () => { clearTimeout(rt); rt=setTimeout(resize, 120); });
  return { setAgents, fire, start(){ resize(); requestAnimationFrame(draw); }, resize };
})();

// ── phase rail ──────────────────────────────────────────────────────────────
function renderRail(phase, status) {
  const box = el('rail');
  // Build the DOM once; afterwards only mutate classes, so the active-phase
  // ring pulse runs continuously instead of restarting every 1.5s poll.
  if (!box.children.length) {
    PHASES.forEach((p,i) => {
      if (i) { const s=document.createElement('div'); s.className='sep'; box.appendChild(s); }
      const d=document.createElement('div'); d.dataset.ph=p;
      d.innerHTML = `<span class="ring"></span>${PHASE_LABEL[p]}`;
      box.appendChild(d);
    });
  }
  const idx = PHASES.indexOf(phase);
  box.querySelectorAll('.ph,[data-ph]').forEach(d => {
    const p = d.dataset.ph; if (!p) return;
    const i = PHASES.indexOf(p);
    const st = (status==='done' || i<idx) ? 'done' : (p===phase && status==='running' ? 'active' : '');
    d.className = 'ph ' + st;
  });
}

// ── decision trail ──────────────────────────────────────────────────────────
let _countShown = 0;
function renderCount() {
  const total = timeline.length;
  if (window.gsap && rendered !== _countShown) {
    gsap.to({v:_countShown}, { v:rendered, duration:.4, ease:'power1.out',
      onUpdate(){ el('count').textContent = `${Math.round(this.targets()[0].v)} / ${total}`; },
      onComplete(){ _countShown = rendered; } });
  } else { el('count').textContent = `${rendered} / ${total}`; }
}
function resetView() { el('feed').innerHTML=''; rendered=0; renderCount(); }

const LABEL = { maestro:'Maestro', conductor:'Conductor', soloist:'Soloist',
                tuningfork:'Tuning Fork', stagetech:'Stage Tech', archivist:'Archivist', human:'You' };
const VERB = { brief:'received the brief', rider:'inferred the resource contract',
               plan:'drafted the build plan', skills:'pulled skills from memory',
               code:'is writing the page', review:'is reviewing the code',
               deploy:'shipped it live', archive:'saved the run to memory',
               recall:'recalled a known fix', learn:'learned a verified fix' };

function flash(col) { // event-reactive screen wash
  if (!window.gsap) return;
  let f = el('flash'); if (!f) { f=document.createElement('div'); f.id='flash';
    f.style.cssText='position:fixed;inset:0;z-index:40;pointer-events:none;opacity:0'; document.body.appendChild(f); }
  f.style.background = `radial-gradient(120% 90% at 50% 50%, ${col}22, transparent 70%)`;
  gsap.fromTo(f,{opacity:.0},{opacity:.9,duration:.12,yoyo:true,repeat:1,ease:'power2.out'});
}

function updateNow(actor, kind, status) {
  const box = el('now');
  if (status !== 'running') { box.classList.remove('show'); return; }
  const col = COLOR[actor] || '#fff';
  box.style.setProperty('--now', col);
  box.innerHTML = `<span class="glyph" style="color:${col}">${GLYPH[actor]||'●'}</span>`+
    `<span class="who">${LABEL[actor]||actor}</span>`+
    `<span class="verb">${VERB[kind]||kind}</span>`+
    `<span class="wave"><i></i><i></i><i></i><i></i></span>`;
  box.classList.add('show');
}

function step(animate) {
  if (rendered >= timeline.length) return false;
  const e = timeline[rendered++];
  Graph.fire(e.actor, e.kind, e.meta);
  const col = COLOR[e.actor] || '#8899bb';
  const div = document.createElement('div');
  div.className = 'ev ' + e.kind;
  div.style.setProperty('--actor', col);
  let txt = (e.text || '').replace(/</g,'&lt;');
  txt = txt.replace(/(https:\/\/[a-z0-9.-]+\.pages\.dev)/i, '<a href="$1" target="_blank" rel="noopener">$1</a>');
  div.innerHTML =
    `<div class="top"><span class="glyph" style="color:${col}">${GLYPH[e.actor]||'●'}</span>`+
    `<span class="who" style="color:${col}">${LABEL[e.actor]||e.actor}</span>`+
    `<span class="kind">${e.kind}</span><span class="ts">${fmt(e.ts)}</span></div>`+
    `<div class="txt">${txt}</div>`;
  el('feed').prepend(div);
  if (animate !== false && window.gsap) gsap.from(div, { duration:.45, y:-10, opacity:0, ease:'power2.out' });
  if (e.kind === 'deploy') { flash('#4fe0a8'); showShipped(e.text || ''); }
  renderCount();
  return true;
}

function showShipped(text) {
  const url = (text.match(/https:\/\/[a-z0-9.-]+\.pages\.dev/i) || [])[0];
  const box = el('shipped');
  box.innerHTML = `<div class="badge">✦ SHIPPED</div>` +
    (url ? `<div class="url"><a href="${url}" target="_blank" rel="noopener">${url}</a></div>` : '');
  if (!window.gsap) return;
  gsap.killTweensOf(box);
  gsap.fromTo(box, { opacity:0, y:14, scale:.92 },
    { opacity:1, y:0, scale:1, duration:.5, ease:'back.out(1.7)' });
  gsap.to(box, { opacity:0, duration:.6, delay:3.2, ease:'power2.in' });
}

function setStatus(status, phase) {
  const p = el('status'); p.className = 'pill ' + (status || 'idle');
  el('statusText').innerHTML = (status||'idle') +
    ((phase && phase!=='done' && status==='running') ? ` <span class="phase">· ${PHASE_LABEL[phase]||phase}</span>` : '');
  // drive the NOW hero from the latest event
  const last = timeline[timeline.length-1];
  if (last) updateNow(last.actor, last.kind, status);
  else el('now').classList.remove('show');
  // idle hero shows only when truly idle (no run loaded)
  el('idle').classList.toggle('show', status==='idle' && !timeline.length);
}

// ── data layer (unchanged contract: /api/live, /api/runs, /api/run/<id>) ─────
function loadDoc(doc, opts={}) {
  const agents = (doc.agents && doc.agents.length) ? doc.agents : DEFAULT_AGENTS;
  if (curRunId !== doc.run_id) Graph.setAgents(agents);
  curRunId = doc.run_id || null;
  timeline = doc.timeline || [];
  curPhase = doc.phase || 'rider';
  el('brief').innerHTML = doc.brief ? `<b>Brief:</b> ${doc.brief}` : '';
  setStatus(doc.status, doc.phase);
  renderRail(doc.phase, doc.status);
  if (!opts.keepFeed) resetView();
  while (step(false)) {}      // bulk catch-up, no per-event animation
}

async function pollLive() {
  let doc; try { doc = await fetch('/api/live').then(r=>r.json()); }
  catch { setStatus('offline'); return; }
  if (!doc || doc.status==='idle') {
    if (!timeline.length) el('feed').innerHTML =
      '<div class="ev"><div class="txt">No active run. Start one:<br><code>uv run python maestro.py "your brief"</code></div></div>';
    setStatus('idle'); renderRail('rider','idle'); return;
  }
  if (selectedRun && selectedRun !== doc.run_id) return;
  if (doc.run_id !== curRunId) { loadDoc(doc); return; }
  el('brief').innerHTML = doc.brief ? `<b>Brief:</b> ${doc.brief}` : '';
  setStatus(doc.status, doc.phase);
  renderRail(doc.phase, doc.status);
  timeline = doc.timeline || timeline;
  while (rendered < timeline.length) step(true);
}

async function refreshRuns() {
  let data; try { data = await fetch('/api/runs').then(r=>r.json()); } catch { return; }
  const recent = (data && data.recent) || [];
  const box = el('runs'); box.innerHTML = '<div class="title">Runs</div>';
  recent.forEach(r => {
    const d=document.createElement('div');
    d.className='run'+(((selectedRun||data.current)===r.run_id)?' sel':'');
    d.title=r.brief||r.run_id;
    d.innerHTML=`<span class="dot ${r.status}"></span><span class="lbl">${r.brief||r.run_id}</span>`;
    d.onclick=()=>selectRun(r.run_id, r.run_id===data.current);
    box.appendChild(d);
  });
}
async function selectRun(runId, isCurrent) {
  selectedRun = isCurrent ? null : runId;
  const url = isCurrent ? '/api/live' : '/api/run/'+runId;
  try { const doc = await fetch(url).then(r=>r.json()); loadDoc(doc); } catch {}
  refreshRuns();
}

async function boot() {
  if (document.fonts && document.fonts.ready) { try { await document.fonts.ready; } catch {} }
  Graph.setAgents(DEFAULT_AGENTS);
  Graph.start();
  let live=null; try { live = await fetch('/api/live').then(r=>r.ok?r.json():null); } catch {}
  if (live) {
    if (live.status && live.status!=='idle') loadDoc(live);
    else { setStatus('idle'); renderRail('rider','idle');
      el('feed').innerHTML='<div class="ev"><div class="txt">No active run. Start one:<br><code>uv run python maestro.py "your brief"</code></div></div>'; }
    await refreshRuns();
    setInterval(pollLive, 1500);
    setInterval(refreshRuns, 10000);
  } else {
    const data = await fetch('replay.json').then(r=>r.json()).catch(()=>null);
    if (!data) { el('feed').innerHTML='<div class="ev"><div class="txt">No data — run serve.py (live) or maestro.py.</div></div>'; return; }
    loadDoc({ ...data, status:'done', phase:'done' });
    setStatus('offline');
  }
  el('step').onclick = () => step(true);
  el('play').onclick = async () => {
    resetView();
    while (step(true)) await new Promise(r=>setTimeout(r,700));
  };
}
boot();
</script>
