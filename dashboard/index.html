<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Crescendo — orchestra of agents</title>
<script src="https://unpkg.com/cytoscape@3.30.2/dist/cytoscape.min.js"></script>
<style>
  :root {
    --bg: #0c0e16; --panel: #141826; --line: #232838; --ink: #e7ebf5;
    --dim: #8b93a8; --gold: #e8b85a; --green: #5ad19a; --blue: #6aa8ff;
    --pink: #d97bb0; --red: #ff6b6b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--ink);
    font: 15px/1.5 -apple-system, "Segoe UI", system-ui, sans-serif;
  }
  header {
    padding: 22px 28px; border-bottom: 1px solid var(--line);
    display: flex; align-items: baseline; gap: 16px;
  }
  header h1 { margin: 0; font-size: 22px; font-weight: 650; letter-spacing: -.3px; }
  header .tag { color: var(--gold); font-weight: 600; }
  header .sub { color: var(--dim); font-size: 13px; }
  .wrap { display: grid; grid-template-columns: 1fr 460px; gap: 0; height: calc(100vh - 67px); }
  #graph { width: 100%; height: 100%; }
  .side { border-left: 1px solid var(--line); background: var(--panel);
          display: flex; flex-direction: column; overflow: hidden; }
  .side h2 { margin: 0; padding: 16px 20px 12px; font-size: 13px; letter-spacing: .08em;
             text-transform: uppercase; color: var(--dim); border-bottom: 1px solid var(--line); }
  .feed { overflow-y: auto; padding: 8px 0; flex: 1; }
  .ev { padding: 11px 20px; border-bottom: 1px solid var(--line); animation: in .25s ease; }
  @keyframes in { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; } }
  .ev .who { font-weight: 650; }
  .ev .op { font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: .05em;
            margin-left: 8px; padding: 1px 6px; border: 1px solid var(--line); border-radius: 4px; }
  .ev .ts { float: right; color: var(--dim); font-size: 12px; font-variant-numeric: tabular-nums; }
  .ev .txt { margin-top: 4px; color: #c5ccdd; font-size: 14px; }
  .who.conductor { color: var(--gold); }
  .who.soloist { color: var(--blue); }
  .who.tuningfork { color: var(--pink); }
  .who.stagetech { color: var(--green); }
  .who.archivist { color: var(--dim); }
  .controls { padding: 12px 20px; border-top: 1px solid var(--line); display: flex; gap: 10px; align-items: center; }
  button { background: var(--gold); color: #1a1205; border: 0; border-radius: 7px;
           padding: 8px 16px; font-weight: 650; cursor: pointer; font-size: 14px; }
  button.ghost { background: transparent; color: var(--ink); border: 1px solid var(--line); }
  .count { color: var(--dim); font-size: 13px; margin-left: auto; }
</style>
</head>
<body>
<header>
  <h1>Crescendo</h1>
  <span class="tag">an orchestra of AI agents where you can prove every decision</span>
  <span class="sub" id="brief"></span>
</header>
<div class="wrap">
  <div id="graph"></div>
  <div class="side">
    <h2>Decision trail · attributed &amp; auditable</h2>
    <div class="feed" id="feed"></div>
    <div class="controls">
      <button id="play">▶ Replay</button>
      <button class="ghost" id="step">Step</button>
      <span class="count" id="count"></span>
    </div>
  </div>
</div>
<script>
const COLOR = { conductor:'#e8b85a', soloist:'#6aa8ff', tuningfork:'#d97bb0',
                stagetech:'#5ad19a', archivist:'#8b93a8' };

async function boot() {
  const data = await fetch('replay.json').then(r => r.json());
  const { agents, timeline } = data;

  // --- graph: conductor in the centre, others around (star) ---
  const nodes = agents.map(a => ({ data: { id: a.id, label: a.label, role: a.role } }));
  const edges = agents.filter(a => a.id !== 'conductor').map(a => ({
    data: { id: 'e_' + a.id, source: 'conductor', target: a.id }
  }));
  const cy = cytoscape({
    container: document.getElementById('graph'),
    elements: [...nodes, ...edges],
    style: [
      { selector: 'node', style: {
        'background-color': ele => COLOR[ele.id()] || '#5566aa',
        'label': 'data(label)', 'color': '#e7ebf5', 'font-size': 15, 'font-weight': 650,
        'text-valign': 'bottom', 'text-margin-y': 7, 'width': 54, 'height': 54,
        'border-width': 2, 'border-color': '#0c0e16' } },
      { selector: 'node[id="conductor"]', style: { 'width': 76, 'height': 76, 'font-size': 17 } },
      { selector: 'edge', style: {
        'width': 2, 'line-color': '#232838', 'target-arrow-color': '#232838',
        'target-arrow-shape': 'triangle', 'curve-style': 'bezier', 'opacity': .6 } },
      { selector: '.active', style: {
        'border-color': '#e8b85a', 'border-width': 4,
        'shadow-blur': 24, 'shadow-color': '#e8b85a', 'shadow-opacity': .8 } },
      { selector: '.fired', style: { 'line-color': '#e8b85a', 'target-arrow-color': '#e8b85a',
        'opacity': 1, 'width': 3 } },
    ],
    layout: { name: 'concentric', concentric: n => n.id() === 'conductor' ? 2 : 1,
              levelWidth: () => 1, minNodeSpacing: 90 },
    userZoomingEnabled: false, userPanningEnabled: false, boxSelectionEnabled: false,
  });

  const feed = document.getElementById('feed');
  const countEl = document.getElementById('count');
  const briefEl = document.getElementById('brief');
  const brief = timeline.find(e => /brief/i.test(e.text));
  if (brief) briefEl.textContent = '· ' + brief.text.slice(0, 90);

  let i = 0;
  function reset() { feed.innerHTML = ''; i = 0; cy.elements().removeClass('active fired'); render(); }
  function fmt(ts) { return ts ? ts.slice(11, 19) : ''; }

  function step() {
    if (i >= timeline.length) return false;
    const e = timeline[i++];
    cy.nodes().removeClass('active');
    const node = cy.getElementById(e.actor);
    if (node) node.addClass('active');
    const edge = cy.getElementById('e_' + e.actor);
    if (edge) edge.addClass('fired');
    const div = document.createElement('div');
    div.className = 'ev';
    div.innerHTML = `<span class="ts">${fmt(e.ts)}</span>` +
      `<span class="who ${e.actor}">${e.actor}</span><span class="op">${e.op}</span>` +
      `<div class="txt">${(e.text || '').replace(/</g,'&lt;')}</div>`;
    feed.prepend(div);
    render();
    return true;
  }
  function render() { countEl.textContent = `${i} / ${timeline.length} decisions`; }

  document.getElementById('step').onclick = step;
  document.getElementById('play').onclick = async () => {
    reset();
    while (step()) { await new Promise(r => setTimeout(r, 650)); }
  };
  reset();
}
boot();
</script>
</body>
</html>
